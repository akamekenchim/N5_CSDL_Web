<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KawaiiEnglish 🌸 Chọn vai trò</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="topbar">
        <div class="brand">🌸 Kawaii<span class="dot">English</span></div>
    </div>

    <div class="container">
        <h1 class="page-title center">Xin chào! Bạn là ai? 👋</h1>
        <p class="page-sub center">Chọn vai trò rồi chọn hồ sơ của bạn để bắt đầu nhé.</p>

        <!-- Bộ chuyển vai trò: Học sinh / Giáo viên -->
        <div class="role-switch">
            <button class="role-btn active" data-role="student">🎒 Học sinh</button>
            <button class="role-btn" data-role="teacher">👩‍🏫 Giáo viên</button>
        </div>

        <div id="profile-grid" class="grid cols-auto">
            <div class="loading">Đang tải danh sách...</div>
        </div>

        <!-- Điều hướng phân trang (Pagination) -->
        <div id="pager" class="pager hidden">
            <button class="btn ghost sm" id="pg-prev">← Trước</button>
            <span class="pill" id="pg-info">Trang 1</span>
            <button class="btn ghost sm" id="pg-next">Sau →</button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
